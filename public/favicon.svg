<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <rect width="48" height="48" rx="8" fill="#1a1a18"/>
  <!-- Diff lines background -->
  <g opacity="0.2">
    <rect x="6" y="8" width="28" height="3" rx="1" fill="#8a8578"/>
    <rect x="6" y="13" width="22" height="3" rx="1" fill="#c23616"/>
    <rect x="6" y="18" width="16" height="3" rx="1" fill="#c23616"/>
    <rect x="6" y="23" width="25" height="3" rx="1" fill="#3a7d44"/>
    <rect x="6" y="28" width="30" height="3" rx="1" fill="#3a7d44"/>
    <rect x="6" y="33" width="20" height="3" rx="1" fill="#3a7d44"/>
    <rect x="6" y="38" width="32" height="3" rx="1" fill="#8a8578"/>
  </g>
  <!-- Magnifier ring -->
  <circle cx="24" cy="24" r="13" fill="none" stroke="#f5f0e8" stroke-width="4"/>
  <circle cx="24" cy="24" r="10" fill="#1a1a18" opacity="0.9"/>
  <!-- +/- inside -->
  <text x="24" y="21" text-anchor="middle" font-family="monospace" font-weight="700" font-size="11" fill="#c23616">−</text>
  <text x="24" y="31" text-anchor="middle" font-family="monospace" font-weight="700" font-size="11" fill="#3a7d44">+</text>
  <!-- Annotation badge -->
  <circle cx="37" cy="10" r="7" fill="#c23616"/>
  <text x="37" y="13.5" text-anchor="middle" font-family="monospace" font-weight="700" font-size="10" fill="#f5f0e8">!</text>
</svg>
